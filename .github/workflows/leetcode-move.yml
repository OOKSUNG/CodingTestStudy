name: Organize LeetCode Solutions

on:
  push:
    paths:
      - '[0-9][0-9][0-9][0-9]-*/**'
  workflow_dispatch:

jobs:
  organize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Move LeetCode folders
        run: |
          shopt -s nullglob

          mkdir -p LeetCode

          for dir in [0-9][0-9][0-9][0-9]-*; do
            echo "Moving $dir → LeetCode/"
            mv "$dir" LeetCode/
          done

      - name: Commit changes
        run: |
          if git status --porcelain | grep .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            git add .
            git commit -m "auto: organize LeetCode solutions"
            git push
          else
            echo "No changes"
          fi
